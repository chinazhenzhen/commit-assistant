<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>commit-assistant Docs</title>
  <style>
    :root {
      --ink: #16212f;
      --muted: #475467;
      --accent: #0f766e;
      --accent-2: #0369a1;
      --line: rgba(10, 37, 64, 0.14);
      --panel: rgba(255, 255, 255, 0.9);
      --bg: linear-gradient(140deg, #fef8e8 0%, #e6f3ff 65%, #f3fffa 100%);
      --shadow: 0 14px 40px rgba(20, 62, 94, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "IBM Plex Sans", "Noto Sans SC", "Source Han Sans SC", "PingFang SC", sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1060px;
      margin: 0 auto;
      padding: 26px 18px 44px;
      animation: fade-up 420ms ease-out;
    }

    .lang {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      margin-bottom: 14px;
      color: var(--muted);
    }

    .lang button {
      border: 0;
      background: transparent;
      font: inherit;
      color: inherit;
      cursor: pointer;
      padding: 0;
      text-decoration: none;
    }

    .lang button.active {
      color: var(--ink);
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -58px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.2), transparent 65%);
      pointer-events: none;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4.1vw, 46px);
      line-height: 1.06;
      letter-spacing: 0.1px;
    }

    .subtitle {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.62;
      font-size: clamp(15px, 2.1vw, 18px);
    }

    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    .card {
      grid-column: span 12;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .card p {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.62;
    }

    .sub {
      margin: 12px 0 6px;
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    code {
      background: rgba(2, 132, 199, 0.09);
      border: 1px solid rgba(2, 132, 199, 0.16);
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 0.93em;
    }

    pre {
      margin: 0;
      background: #0d1b2a;
      color: #e5faff;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 12px 14px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.56;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.62;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .foot {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (min-width: 900px) {
      .card-half { grid-column: span 6; }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="lang" aria-label="Language switch">
      <button id="lang-zh" class="active" type="button">简体中文</button>
      <span>|</span>
      <button id="lang-en" type="button">English</button>
    </div>

    <section class="hero">
      <h1 id="title">commit-assistant</h1>
      <p class="subtitle" id="subtitle"></p>
    </section>

    <section class="grid">
      <article class="card card-half">
        <h2 id="codex-title"></h2>
        <p id="codex-desc"></p>

        <div class="sub" id="codex-user-title"></div>
        <pre id="codex-user-code"></pre>

        <div class="sub" id="codex-project-title"></div>
        <pre id="codex-project-code"></pre>

        <p class="muted" id="codex-verify"></p>
      </article>

      <article class="card card-half">
        <h2 id="claude-title"></h2>
        <p id="claude-desc"></p>

        <div class="sub" id="claude-user-title"></div>
        <pre id="claude-user-code"></pre>

        <div class="sub" id="claude-project-title"></div>
        <pre id="claude-project-code"></pre>

        <p class="muted" id="claude-verify"></p>
      </article>

      <article class="card">
        <h2 id="usage-title"></h2>
        <p id="usage-desc"></p>
        <pre id="usage-code"></pre>
      </article>

      <article class="card">
        <h2 id="standards-title"></h2>
        <p id="standards-desc"></p>
        <ul id="standards-list"></ul>
      </article>
    </section>

    <div class="foot" id="foot"></div>
  </main>

  <script>
    const I18N = {
      zh: {
        subtitle: "为 Codex / Claude Code 生成高质量 Conventional Commit 与开源风格提交描述（Why / What changed / Impact）。",
        codexTitle: "安装到 Codex",
        codexDesc: "推荐目录（官方）：<code>.agents/skills</code>。如果你的环境仍使用旧目录，可兼容放置到 <code>~/.codex/skills</code>。",
        codexUserTitle: "用户级（全局）",
        codexUserCode: "mkdir -p ~/.agents/skills\ngit clone git@github.com:chinazhenzhen/commit-assistant.git ~/.agents/skills/commit-assistant",
        codexProjectTitle: "项目级（当前仓库）",
        codexProjectCode: "mkdir -p .agents/skills\ngit clone git@github.com:chinazhenzhen/commit-assistant.git .agents/skills/commit-assistant",
        codexVerify: "验证：在 Codex 输入 /skills，或显式调用 $commit-assistant。",

        claudeTitle: "安装到 Claude Code",
        claudeDesc: "支持两级目录：用户级 <code>~/.claude/skills</code> 与项目级 <code>.claude/skills</code>。",
        claudeUserTitle: "用户级（全局）",
        claudeUserCode: "mkdir -p ~/.claude/skills\ngit clone git@github.com:chinazhenzhen/commit-assistant.git ~/.claude/skills/commit-assistant",
        claudeProjectTitle: "项目级（当前项目）",
        claudeProjectCode: "mkdir -p .claude/skills\ngit clone git@github.com:chinazhenzhen/commit-assistant.git .claude/skills/commit-assistant",
        claudeVerify: "验证：在 Claude Code 输入 /commit-assistant，或直接自然语言触发。",

        usageTitle: "使用示例",
        usageDesc: "先 dry-run 预览消息，再执行真实提交。",
        usageCode: "scripts/auto-commit.sh --dry-run --no-push \\\n  --intent \"修复登录死循环并补充错误提示\" \\\n  --context \"线上稳定性优先，需要回归验证说明\"",

        standardsTitle: "Skill 标准对齐",
        standardsDesc: "当前仓库的结构与质量保障：",
        standards: [
          "<code>SKILL.md</code>：触发导向 frontmatter + 明确工作流",
          "<code>scripts/auto-commit.sh</code>：可执行、可复用",
          "<code>tests/*.sh</code>：描述生成与上下文流转覆盖",
          "<code>agents/openai.yaml</code>：UI 元数据与默认提示词"
        ],

        foot: "Language switch style inspired by awesome-agent-skills."
      },
      en: {
        subtitle: "Generate high-quality Conventional Commits and OSS-friendly commit bodies (Why / What changed / Impact) for Codex / Claude Code.",
        codexTitle: "Install in Codex",
        codexDesc: "Recommended official directory: <code>.agents/skills</code>. If your setup still uses the legacy layout, <code>~/.codex/skills</code> is a compatible fallback.",
        codexUserTitle: "User-level (global)",
        codexUserCode: "mkdir -p ~/.agents/skills\ngit clone git@github.com:chinazhenzhen/commit-assistant.git ~/.agents/skills/commit-assistant",
        codexProjectTitle: "Project-level (current repo)",
        codexProjectCode: "mkdir -p .agents/skills\ngit clone git@github.com:chinazhenzhen/commit-assistant.git .agents/skills/commit-assistant",
        codexVerify: "Verify: run /skills in Codex, or invoke $commit-assistant explicitly.",

        claudeTitle: "Install in Claude Code",
        claudeDesc: "Two scopes are supported: user-level <code>~/.claude/skills</code> and project-level <code>.claude/skills</code>.",
        claudeUserTitle: "User-level (global)",
        claudeUserCode: "mkdir -p ~/.claude/skills\ngit clone git@github.com:chinazhenzhen/commit-assistant.git ~/.claude/skills/commit-assistant",
        claudeProjectTitle: "Project-level (current project)",
        claudeProjectCode: "mkdir -p .claude/skills\ngit clone git@github.com:chinazhenzhen/commit-assistant.git .claude/skills/commit-assistant",
        claudeVerify: "Verify: run /commit-assistant in Claude Code, or trigger it with natural language.",

        usageTitle: "Usage Example",
        usageDesc: "Preview with dry-run first, then run a real commit.",
        usageCode: "scripts/auto-commit.sh --dry-run --no-push \\\n  --intent \"Fix retry loop and improve error feedback\" \\\n  --context \"Production stability first with clear regression notes\"",

        standardsTitle: "Standards Alignment",
        standardsDesc: "Current repository structure and quality checks:",
        standards: [
          "<code>SKILL.md</code>: trigger-focused frontmatter + explicit workflow",
          "<code>scripts/auto-commit.sh</code>: executable and reusable",
          "<code>tests/*.sh</code>: coverage for body generation and context flow",
          "<code>agents/openai.yaml</code>: UI metadata and default prompt"
        ],

        foot: "Language switch style inspired by awesome-agent-skills."
      }
    };

    const refs = {
      title: document.getElementById("title"),
      subtitle: document.getElementById("subtitle"),
      codexTitle: document.getElementById("codex-title"),
      codexDesc: document.getElementById("codex-desc"),
      codexUserTitle: document.getElementById("codex-user-title"),
      codexUserCode: document.getElementById("codex-user-code"),
      codexProjectTitle: document.getElementById("codex-project-title"),
      codexProjectCode: document.getElementById("codex-project-code"),
      codexVerify: document.getElementById("codex-verify"),

      claudeTitle: document.getElementById("claude-title"),
      claudeDesc: document.getElementById("claude-desc"),
      claudeUserTitle: document.getElementById("claude-user-title"),
      claudeUserCode: document.getElementById("claude-user-code"),
      claudeProjectTitle: document.getElementById("claude-project-title"),
      claudeProjectCode: document.getElementById("claude-project-code"),
      claudeVerify: document.getElementById("claude-verify"),

      usageTitle: document.getElementById("usage-title"),
      usageDesc: document.getElementById("usage-desc"),
      usageCode: document.getElementById("usage-code"),

      standardsTitle: document.getElementById("standards-title"),
      standardsDesc: document.getElementById("standards-desc"),
      standardsList: document.getElementById("standards-list"),
      foot: document.getElementById("foot")
    };

    const btnZh = document.getElementById("lang-zh");
    const btnEn = document.getElementById("lang-en");

    function renderList(node, list) {
      node.innerHTML = "";
      list.forEach((text) => {
        const li = document.createElement("li");
        li.innerHTML = text;
        node.appendChild(li);
      });
    }

    function render(lang) {
      const t = I18N[lang];

      refs.title.textContent = "commit-assistant";
      refs.subtitle.textContent = t.subtitle;

      refs.codexTitle.textContent = t.codexTitle;
      refs.codexDesc.innerHTML = t.codexDesc;
      refs.codexUserTitle.textContent = t.codexUserTitle;
      refs.codexUserCode.textContent = t.codexUserCode;
      refs.codexProjectTitle.textContent = t.codexProjectTitle;
      refs.codexProjectCode.textContent = t.codexProjectCode;
      refs.codexVerify.textContent = t.codexVerify;

      refs.claudeTitle.textContent = t.claudeTitle;
      refs.claudeDesc.innerHTML = t.claudeDesc;
      refs.claudeUserTitle.textContent = t.claudeUserTitle;
      refs.claudeUserCode.textContent = t.claudeUserCode;
      refs.claudeProjectTitle.textContent = t.claudeProjectTitle;
      refs.claudeProjectCode.textContent = t.claudeProjectCode;
      refs.claudeVerify.textContent = t.claudeVerify;

      refs.usageTitle.textContent = t.usageTitle;
      refs.usageDesc.textContent = t.usageDesc;
      refs.usageCode.textContent = t.usageCode;

      refs.standardsTitle.textContent = t.standardsTitle;
      refs.standardsDesc.textContent = t.standardsDesc;
      renderList(refs.standardsList, t.standards);
      refs.foot.textContent = t.foot;

      const isZh = lang === "zh";
      btnZh.classList.toggle("active", isZh);
      btnEn.classList.toggle("active", !isZh);
      document.documentElement.lang = isZh ? "zh-CN" : "en";
    }

    btnZh.addEventListener("click", () => render("zh"));
    btnEn.addEventListener("click", () => render("en"));
    render("zh");
  </script>
</body>
</html>
